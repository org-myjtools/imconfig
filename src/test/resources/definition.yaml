defined.property.required:
   description: This is a test property that is required
   required: true
   type: text

defined.property.with-default-value:
   description: This is a property with a default value
   type: integer
   defaultValue: 5

defined.property.regex-text:
   type: text
   constraints:
      pattern: A\d\dB

defined.property.min-max-number:
   type: integer
   constraints:
      min: 2
      max: 3

defined.property.enumeration:
   type: enum
   constraints:
      values:
         - red
         - yellow
         - orange

defined.property.boolean:
   type: boolean


defined.property.map:
   description: |
      Map of named datasource configurations. Each key is the datasource alias used in
      test steps to identify the target database connection.
   type: map
   entries:
      url:
         description: The JDBC connection URL for the datasource.
         type: text
         required: true
      username:
         description: The username used to authenticate against the database.
         type: text
         required: true
      password:
         description: The password used to authenticate against the database.
         type: text
         required: true
      driver:
         description: The fully qualified class name of the JDBC driver.
         type: text
         required: true
      dialect:
         description: |
            The SQL dialect for the datasource (e.g. POSTGRES, MYSQL, H2, ORACLE,
            SQLSERVER). Must match a value of org.jooq.SQLDialect.
         type: text
         required: true
      schema:
         description: The default schema to use for the datasource. Optional.
         type: text
      catalog:
         description: The default catalog to use for the datasource. Optional.
         type: text